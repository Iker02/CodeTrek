<div
  class="relative flex min-h-screen flex-col bg-gray-900 dark group/design-root overflow-x-hidden"
>
  <div class="layout-container flex flex-col">
    <header
      class="fixed top-0 left-0 w-full flex items-center justify-between whitespace-nowrap border-b border-solid border-b-[#293038] px-6 py-3 bg-gray-800 z-50"
    >
      <!-- Logo (Se ajusta según el tamaño de pantalla) -->
      <button (click)="navigateToHome()">
        <div
          class="flex items-center gap-4 text-xl md:text-2xl lg:text-3xl xl:text-4xl"
          style="
            font-family: 'Press Start 2P';
            background: linear-gradient(to right, white, #008cff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
          "
        >
          CODETREK
        </div>
      </button>

      <!-- Botón de hamburguesa (Solo en pantallas pequeñas) -->
      <button
        class="md:hidden flex items-center justify-center p-2 rounded-lg text-white transform transition-all duration-150 ease-in-out active:scale-90 active:rotate-180"
        (click)="toggleMenu()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="40"
          height="40"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <!-- Menú normal en pantallas grandes -->
      <div class="hidden md:flex flex-1 justify-end gap-1">
        <button
          class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 text-white text-sm font-bold leading-normal tracking-[0.015em]"
          (click)="navigateToHome()"
        >
          <span class="truncate">Home</span>
        </button>
        <button
          class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 text-white text-sm font-bold leading-normal tracking-[0.015em]"
          (click)="navigateToCatalog()"
        >
          <span class="truncate">Catalog</span>
        </button>
        <button
          class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 text-white text-sm font-bold leading-normal tracking-[0.015em]"
        >
          <span class="truncate">Challenges</span>
        </button>
        <button
          class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 bg-[#1980e6] text-white text-sm font-bold leading-normal tracking-[0.015em]"
          (click)="navigateToLogin()"
        >
          <span class="truncate">Sign In</span>
        </button>
      </div>

      <!-- Imagen de perfil -->
      <button class="hidden md:flex">
        <img
          src="../assets/profile_icon.webp"
          alt="imagen de perfil"
          class="rounded-full h-10 w-10 bg-[#1980e6] ml-4"
        />
      </button>
    </header>

    <!-- Sidebar (Menú lateral) -->
    <div
      class="fixed top-0 right-0 h-full w-64 bg-gray-900 text-white transform transition-transform duration-300 ease-in-out z-50"
      [ngClass]="{
        'translate-x-0': isMenuOpen,
        'translate-x-full': !isMenuOpen
      }"
    >
      <div
        class="p-4 flex flex-col space-y-4 flex gap-2 sm:gap-4 "
      >
        <!-- Botón para cerrar el menú -->
        <button
          class="self-end text-gray-400 hover:text-white text-2xl transform transition-transform duration-150 ease-in-out active:scale-90"
          (click)="toggleMenu()"
        >
          ❌
        </button>

        <button class="flex items-center justify-center bg-grey-700">
          <img
            src="../assets/profile_icon.webp"
            alt="imagen de perfil"
            class="rounded-full h-10 w-10 bg-[#1980e6]"
          />
        </button>

        <button
          class="flex min-w-[84px] max-w-[480px] cursor-pointer overflow-hidden rounded-xl h-10 px-4 text-white text-sm font-bold leading-normal tracking-[0.015em]"
          (click)="navigateToHome()"
          (click)="toggleMenu()"
        >
          <span class="truncate">Home</span>
        </button>
        <button
          class="flex min-w-[84px] max-w-[480px] cursor-pointer overflow-hidden rounded-xl h-10 px-4 text-white text-sm font-bold leading-normal tracking-[0.015em]"
          (click)="navigateToCatalog()"
          (click)="toggleMenu()"
        >
          <span class="truncate">Catalog</span>
        </button>
        <button
          class="flex min-w-[84px] max-w-[480px] cursor-pointer overflow-hidden rounded-xl h-10 px-4 text-white text-sm font-bold leading-normal tracking-[0.015em]"
        >
          <span class="truncate">Challenges</span>
        </button>
        <button
          class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center overflow-hidden rounded-xl h-10 px-4 bg-[#1980e6] text-white text-sm font-bold leading-normal tracking-[0.015em]"
          (click)="navigateToLogin()"
          (click)="toggleMenu()"
        >
          <span class="truncate">Sign In</span>
        </button>
      </div>
    </div>
  </div>
  <router-outlet></router-outlet>
</div>
