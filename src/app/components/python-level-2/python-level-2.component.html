<div class="flex flex-col items-center justify-center h-screen text-center">
    <h1 class="text-4xl font-bold text-white">{{ courseTitle | titlecase }} - Level {{ level }}</h1>
    <p class="text-lg text-gray-300 mt-4">
      Welcome to Level {{ level }} of {{ courseTitle }}! Let's work with math operations.
    </p>
    
    <p class="text-white mt-4">
      What is the result of the following operation in Python? <br>
      <code>8 * (4 + 2) - 6 / 2</code>
    </p>
    
    <input 
      type="number" 
      [(ngModel)]="answer" 
      placeholder="Your answer" 
      class="mt-4 px-4 py-2 rounded-lg" 
      style="width: 200px;"
    />
    
    <button 
      (click)="checkAnswer()" 
      class="mt-4 px-4 py-2 bg-green-600 text-white rounded-lg">
      Check Answer
    </button>
  
    <p class="mt-4 text-white">{{ feedbackMessage }}</p>
  
    <button 
      *ngIf="feedbackMessage.includes('Correct')" 
      (click)="goToNextLevel()" 
      class="mt-6 px-4 py-2 bg-blue-600 text-white rounded-lg">
      Next Level
    </button>
  </div>
