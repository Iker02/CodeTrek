<div
  class="flex flex-col items-center justify-center min-h-screen bg-gray-700 text-center p-8 mt-14"
>
  <h1 class="text-5xl font-extrabold text-white mb-4">
    Python - Level 3: Logical Operators
  </h1>
  <p class="text-xl text-white mb-6">
    Let's test your knowledge of logical operators!
  </p>

  <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-xl mx-auto">
    <h2 class="text-3xl font-bold text-gray-800 mb-4">
      What will be the output of this Python expression?
    </h2>
    <p class="text-lg text-gray-700 mb-4 font-mono bg-gray-200 p-4 rounded-md">
      <span class="text-blue-500">a</span> =
      <span class="text-green-500">True</span><br />
      <span class="text-blue-500">b</span> =
      <span class="text-red-500">False</span><br />
      <span class="text-blue-500">c</span> =
      <span class="text-green-500">True</span><br />
      <span class="text-yellow-600">print</span>((<span class="text-blue-500"
        >a</span
      >
      <span class="text-black"> or </span>
      <span class="text-blue-500">b</span>)
      <span class="text-black"> and </span>
      <span class="text-black">not </span> (<span class="text-blue-500"
        >b</span
      >
      <span class="text-black"> and </span>
      <span class="text-blue-500">c</span>))
    </p>

    <div class="flex flex-col gap-4 mb-6">
      <button
        (click)="checkAnswer('option1')"
        class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all"
      >
        True
      </button>
      <button
        (click)="checkAnswer('option2')"
        class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all"
      >
        False
      </button>
      <button
        (click)="checkAnswer('option3')"
        class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all"
      >
        None
      </button>
    </div>

    <p *ngIf="feedbackMessage" class="text-lg text-gray-700 mt-4">
      {{ feedbackMessage }}
    </p>

    <button
      *ngIf="feedbackMessage.includes('Correct')"
      (click)="goToNextLevel()"
      class="mt-6 px-6 py-3 bg-green-600 text-white rounded-lg shadow-md hover:bg-green-700 transition-all"
    >
      Next Level
    </button>
  </div>
</div>
